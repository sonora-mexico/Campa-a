<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MexiSonora Growth MAX</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

textarea{
width:90%;
height:120px;
border-radius:10px;
padding:10px;
font-size:16px;
}

img{
width:150px;
border-radius:10px;
margin:6px;
cursor:pointer;
}

.video{
background:#1e293b;
padding:10px;
border-radius:10px;
margin:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>MexiSonora Growth MAX</h1>

<h2>Generador de Tweet Viral</h2>

<textarea id="tweet"></textarea><br>

<button onclick="generarTweet()">Generar Tweet</button>
<button onclick="publicar()">Publicar en X</button>

<h2>Agregar imagen del norte de México</h2>

<img src="https://images.unsplash.com/photo-1608142136283-4f0b7c8a1c0e" onclick="agregarImagen(this.src)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="agregarImagen(this.src)">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" onclick="agregarImagen(this.src)">
<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429" onclick="agregarImagen(this.src)">

<h2>Videos del norte de México</h2>

<div class="video" onclick="agregarVideo('https://youtu.be/g7o8F9d4Gk4')">
Desierto de Sonora
</div>

<div class="video" onclick="agregarVideo('https://youtu.be/0u6yFQkY5L8')">
Sierra Madre Occidental
</div>

<div class="video" onclick="agregarVideo('https://youtu.be/W3s4YF1r8eM')">
Caballos del norte
</div>

<script>

let media=""

function generarTweet(){

const frases=[
"El norte de México no se explica… se vive.",
"Donde el desierto enseña carácter.",
"El espíritu del norte es libertad.",
"Así se ve la grandeza del norte mexicano.",
"Orgullo del desierto y de la sierra."
]

let f=frases[Math.floor(Math.random()*frases.length)]

document.getElementById("tweet").value=f+" #Sonora #NorteDeMexico @MexiSonora"

}

function agregarImagen(src){

media=src

document.getElementById("tweet").value += " "+src

}

function agregarVideo(url){

media=url

document.getElementById("tweet").value += " "+url

}

function publicar(){

let texto=document.getElementById("tweet").value

let url="https://twitter.com/intent/tweet?text="+encodeURIComponent(texto)

window.open(url)

}

</script>

</body>
</html>
