<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MexiSonora Growth Engine 5.0</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
text-align:center;
}

h1{
color:#38bdf8;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:12px;
margin:15px auto;
max-width:800px;
}

textarea{
width:95%;
height:180px;
padding:10px;
border-radius:10px;
font-size:16px;
}

button{
background:#22c55e;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#16a34a;
}

video,img{
width:90%;
border-radius:10px;
margin-top:10px;
}

#contador{
color:#94a3b8;
margin-top:6px;
}

.hilo{
background:#0f172a;
padding:10px;
margin:6px;
border-radius:8px;
text-align:left;
}

</style>
</head>

<body>

<h1>MexiSonora Growth Engine 5.0</h1>

<div class="panel">

<h2>Editor de Tweet</h2>

<textarea id="tweet" oninput="contar()"></textarea>

<div id="contador">0 / 280</div>

<br>

<button onclick="tweetHistoria()">Historia Norteña</button>
<button onclick="tweetPaisaje()">Paisaje Sonorense</button>
<button onclick="tweetMotivacion()">Motivación</button>

<br>

<button onclick="publicar()">Publicar en X</button>

</div>

<div class="panel">

<h2>Insertar Video o Foto</h2>

<input type="file" id="mediaUpload" accept="image/*,video/*">

<br>

<video id="videoPreview" controls style="display:none"></video>
<img id="imgPreview" style="display:none"/>

<button onclick="insertarMedia()">Insertar enlace al tweet</button>

</div>

<div class="panel">

<h2>Generador de Hilo Viral</h2>

<button onclick="generarHilo()">Crear hilo de 5 tweets</button>

<div id="hiloContainer"></div>

</div>

<script>

let mediaLink=""

function contar(){

let t=document.getElementById("tweet").value.length
document.getElementById("contador").innerText=t+" / 280"

}

function tweetHistoria(){

let textos=[

`El desierto de Sonora parece silencioso.

Pero si observas con atención descubrirás algo poderoso.

El viento moviendo la arena, el sol cayendo sobre la sierra y un horizonte que parece infinito.

Aquí uno entiende por qué el norte de México tiene carácter.`,

`En el norte de México los paisajes no solo se observan.

Se sienten.

La inmensidad del desierto, la fuerza de la sierra y la historia que vive en cada camino.

Sonora no se visita.

Se experimenta.`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t
contar()

}

function tweetPaisaje(){

let textos=[

`Atardecer en Sonora.

El cielo se pinta de naranja mientras la sierra se oscurece lentamente.

El silencio del desierto solo se rompe con el viento.

Momentos así recuerdan por qué el norte de México es único.`,

`Hay paisajes que parecen infinitos.

El desierto de Sonora es uno de ellos.

Un lugar donde el cielo se encuentra con la tierra y el tiempo parece detenerse.`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t
contar()

}

function tweetMotivacion(){

let textos=[

`En el norte aprendimos algo importante.

El carácter se forma enfrentando el desierto.

Cada obstáculo fortalece.

Cada día suma.

Y cada paso nos acerca al objetivo.`,

`Disciplina.

Carácter.

Resistencia.

Tres palabras que describen a quienes crecen en el norte de México.`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t
contar()

}

document.getElementById("mediaUpload").onchange=function(e){

let file=e.target.files[0]

let url=URL.createObjectURL(file)

mediaLink=url

if(file.type.startsWith("video")){

document.getElementById("videoPreview").style.display="block"
document.getElementById("videoPreview").src=url

document.getElementById("imgPreview").style.display="none"

}else{

document.getElementById("imgPreview").style.display="block"
document.getElementById("imgPreview").src=url

document.getElementById("videoPreview").style.display="none"

}

}

function insertarMedia(){

document.getElementById("tweet").value += " [video/foto adjunta]"
contar()

}

function publicar(){

let texto=document.getElementById("tweet").value

let url="https://twitter.com/intent/tweet?text="+encodeURIComponent(texto)

window.open(url)

}

function generarHilo(){

let cont=document.getElementById("hiloContainer")

cont.innerHTML=""

let hilo=[

"1️⃣ El desierto de Sonora es uno de los lugares más impresionantes del norte de México.",

"2️⃣ Su paisaje parece infinito, con horizontes abiertos y cielos enormes.",

"3️⃣ Durante el atardecer los colores cambian cada minuto.",

"4️⃣ La sierra y el desierto crean un contraste espectacular.",

"5️⃣ Lugares así recuerdan por qué el norte tiene tanto carácter."

]

hilo.forEach(t=>{

let div=document.createElement("div")
div.className="hilo"
div.innerText=t

cont.appendChild(div)

})

}

</script>

</body>
</html>
