<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MexiSonora Growth Engine 7.0</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

.panel{
background:#1e293b;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:950px;
}

textarea{
width:95%;
height:180px;
border-radius:10px;
padding:10px;
font-size:16px;
}

button{
background:#22c55e;
border:none;
padding:12px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

video,img{
width:90%;
margin-top:10px;
border-radius:10px;
}

#contador{
color:#94a3b8;
}

.idea{
background:#0f172a;
padding:10px;
margin:6px;
border-radius:8px;
text-align:left;
}

</style>

</head>

<body>

<h1>MexiSonora Growth Engine 7.0</h1>

<div class="panel">

<h2>Editor de Tweet</h2>

<textarea id="tweet" oninput="contador()"></textarea>

<div id="contador">0 / 280</div>

<br>

<button onclick="tweetHistoria()">Historia Norteña</button>
<button onclick="tweetPaisaje()">Paisaje Sonorense</button>
<button onclick="tweetMotivacion()">Motivación Norteña</button>

<br>

<button onclick="publicar()">Publicar en X</button>
<button onclick="guardar()">Guardar Tweet</button>

</div>

<div class="panel">

<h2>Subir Foto o Video</h2>

<input type="file" id="mediaUpload" accept="image/*,video/*">

<br>

<video id="videoPreview" controls style="display:none"></video>
<img id="imgPreview" style="display:none">

<button onclick="insertarMedia()">Insertar referencia</button>

</div>

<div class="panel">

<h2>Agregar Video Viral</h2>

<input type="text" id="videoLink" placeholder="Pegar link de YouTube">

<button onclick="insertarVideo()">Insertar en tweet</button>

</div>

<div class="panel">

<h2>Generador de Hashtags</h2>

<button onclick="hashtags()">Generar hashtags</button>

<div id="hashtags"></div>

</div>

<div class="panel">

<h2>Ideas Virales</h2>

<button onclick="ideas()">Generar ideas</button>

<div id="ideas"></div>

</div>

<div class="panel">

<h2>Tweets Guardados</h2>

<div id="guardados"></div>

</div>

<script>

function contador(){

let t=document.getElementById("tweet").value.length

document.getElementById("contador").innerText=t+" / 280"

}

function tweetHistoria(){

let textos=[

`El desierto de Sonora es uno de los lugares más impresionantes del norte de México.

Horizontes abiertos, silencio absoluto y una sensación de libertad que no existe en ningún otro lugar.`,

`Hay paisajes que cambian tu forma de ver el mundo.

El desierto de Sonora es uno de ellos.

Un lugar donde el horizonte parece infinito.`

]

document.getElementById("tweet").value=textos[Math.floor(Math.random()*textos.length)]

contador()

}

function tweetPaisaje(){

let textos=[

`Atardecer en Sonora.

La sierra se oscurece mientras el cielo se llena de colores intensos.

Momentos así recuerdan por qué el norte de México es único.`,

`El norte de México guarda paisajes increíbles.

Desiertos, sierras y horizontes que parecen no terminar.`

]

document.getElementById("tweet").value=textos[Math.floor(Math.random()*textos.length)]

contador()

}

function tweetMotivacion(){

let textos=[

`En el norte aprendimos algo importante.

La disciplina y el carácter terminan abriendo cualquier camino.`,

`El desierto enseña paciencia.

Y la paciencia crea fuerza.`

]

document.getElementById("tweet").value=textos[Math.floor(Math.random()*textos.length)]

contador()

}

function publicar(){

let texto=document.getElementById("tweet").value

window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(texto))

}

function guardar(){

let t=document.getElementById("tweet").value

let div=document.createElement("div")

div.className="idea"

div.innerText=t

document.getElementById("guardados").appendChild(div)

}

function insertarMedia(){

document.getElementById("tweet").value+=" [foto/video]"

contador()

}

function insertarVideo(){

let link=document.getElementById("videoLink").value

document.getElementById("tweet").value+=" "+link

contador()

}

function hashtags(){

let tags=[
"#Sonora","#NorteDeMexico","#PaisajesDeMexico",
"#Desierto","#OrgulloSonorense","#TurismoMexico"
]

document.getElementById("hashtags").innerText=tags.join(" ")

}

function ideas(){

let ideas=[
"Los paisajes más impresionantes del desierto de Sonora",
"Historias del norte de México que pocos conocen",
"Curiosidades del desierto sonorense",
"Atardeceres únicos del norte mexicano"
]

let cont=document.getElementById("ideas")

cont.innerHTML=""

ideas.forEach(i=>{

let div=document.createElement("div")

div.className="idea"

div.innerText=i

cont.appendChild(div)

})

}

</script>

</body>
</html>
