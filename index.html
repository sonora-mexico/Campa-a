<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MexiSonora Growth Engine PRO</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

.panel{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:12px;
}

button{
background:#22c55e;
border:none;
padding:14px;
margin:6px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

textarea{
width:95%;
height:160px;
border-radius:10px;
padding:12px;
font-size:16px;
}

video{
width:90%;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>MexiSonora Growth Engine PRO</h1>

<div class="panel">

<h2>Generador de Tweets Detallados</h2>

<textarea id="tweet"></textarea><br>

<button onclick="tweetHistoria()">Tweet Storytelling</button>
<button onclick="tweetPaisaje()">Tweet Paisaje</button>
<button onclick="tweetMotivacion()">Tweet Motivación Norteña</button>

<br>

<button onclick="publicar()">Publicar en X</button>

</div>

<div class="panel">

<h2>Subir Video</h2>

<input type="file" id="videoUpload" accept="video/*">

<br>

<video id="preview" controls></video>

</div>

<script>

let videoURL=""

document.getElementById("videoUpload").onchange=function(e){

let file=e.target.files[0]

videoURL=URL.createObjectURL(file)

document.getElementById("preview").src=videoURL

document.getElementById("tweet").value += " Video del norte de México."

}

function tweetHistoria(){

let textos=[

`Hay lugares que no se describen fácilmente.

El desierto de Sonora es uno de ellos.

Silencio, horizonte infinito y una sensación de libertad que no existe en ningún otro lugar.

Aquí el viento escribe historias en la arena.

#Sonora #NorteDeMexico @MexiSonora`,

`En el norte de México el paisaje no solo se mira.

Se respira.

Sierra, desierto y cielo abierto que parecen no terminar nunca.

Es la tierra donde la gente aprende a resistir y a avanzar.

#Sonora #OrgulloNorteño @MexiSonora`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t

}

function tweetPaisaje(){

let textos=[

`Atardecer en el desierto de Sonora.

Los colores del cielo cambian cada minuto mientras la sierra dibuja su silueta en el horizonte.

Es un espectáculo que solo el norte de México puede ofrecer.

#Sonora #PaisajesMexicanos`,

`Cuando el sol cae sobre la sierra madre occidental el paisaje se transforma.

El norte de México revela su carácter.

Imponente, silencioso y libre.

#NorteDeMexico`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t

}

function tweetMotivacion(){

let textos=[

`La gente del norte aprende algo desde joven.

El camino no siempre es fácil.

Pero la disciplina y el carácter terminan abriendo cualquier puerta.

Sigue avanzando.

#Motivacion #Sonora`,

`Los desiertos enseñan algo importante.

La resistencia crea fuerza.

Y la fuerza crea destino.

#Motivacion #NorteDeMexico`

]

let t=textos[Math.floor(Math.random()*textos.length)]

document.getElementById("tweet").value=t

}

function publicar(){

let texto=document.getElementById("tweet").value

let url="https://twitter.com/intent/tweet?text="+encodeURIComponent(texto)

window.open(url)

}

</script>

</body>
</html>
